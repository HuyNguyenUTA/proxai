<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProxAI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; }
  header { background: #1a1d27; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 700; color: #7c3aed; }
  header span { font-size: 12px; color: #64748b; background: #1e293b; padding: 2px 8px; border-radius: 4px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
  .card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
  .card h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #e2e8f0; }
  .stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
  .providers { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .provider-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
  .provider-badge.ok { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .provider-badge.missing { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #64748b; font-weight: 500; border-bottom: 1px solid #2d3748; }
  td { padding: 8px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  tr:hover td { background: #1e293b; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: #052e16; color: #4ade80; }
  .badge-err { background: #450a0a; color: #f87171; }
  .section-title { font-size: 15px; font-weight: 600; color: #94a3b8; margin-bottom: 12px; }
  canvas { max-height: 220px; }
  .playground { margin-bottom: 24px; }
  .pg-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .pg-row label { font-size: 12px; color: #64748b; display: block; margin-bottom: 4px; }
  select, input[type=text], input[type=number], textarea {
    background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0;
    border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none;
    font-family: inherit;
  }
  select:focus, input:focus, textarea:focus { border-color: #7c3aed; }
  textarea { width: 100%; resize: vertical; min-height: 80px; }
  .pg-controls { flex: 1; min-width: 140px; }
  .btn { background: #7c3aed; color: #fff; border: none; border-radius: 8px;
    padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #6d28d9; }
  .btn:disabled { background: #4c1d95; cursor: not-allowed; opacity: 0.6; }
  .pg-response { background: #0f1117; border: 1px solid #2d3748; border-radius: 8px;
    padding: 16px; font-size: 12px; font-family: monospace; white-space: pre-wrap;
    color: #94a3b8; min-height: 60px; max-height: 300px; overflow-y: auto; }
  .pg-response.ok { border-color: #166534; color: #4ade80; }
  .pg-response.err { border-color: #7f1d1d; color: #f87171; }
</style>
</head>
<body>
<header>
  <h1>⚡ ProxAI</h1>
  <span id="version">v0.1.0</span>
  <span id="last-updated" style="margin-left:auto;"></span>
</header>
<div class="container">
  <!-- Provider Status -->
  <div class="providers" id="providers"></div>

  <!-- Today Stats -->
  <div class="grid-4" id="today-stats">
    <div class="card"><h3>Requests Today</h3><div class="stat-value" id="s-req">—</div></div>
    <div class="card"><h3>Tokens Today</h3><div class="stat-value" id="s-tok">—</div></div>
    <div class="card"><h3>Cost Today</h3><div class="stat-value" id="s-cost">—</div></div>
    <div class="card"><h3>Monthly Cost</h3><div class="stat-value" id="s-mcost">—</div></div>
  </div>

  <!-- Charts -->
  <div class="grid-2">
    <div class="card">
      <p class="section-title">Requests by Provider (30d)</p>
      <canvas id="chart-requests"></canvas>
    </div>
    <div class="card">
      <p class="section-title">Cost by Provider (30d, USD)</p>
      <canvas id="chart-cost"></canvas>
    </div>
  </div>

  <!-- Playground -->
  <div class="card playground">
    <p class="section-title">Playground</p>
    <div class="pg-row">
      <div class="pg-controls">
        <label>Provider</label>
        <select id="pg-provider" onchange="onProviderChange()">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="deepseek">DeepSeek</option>
          <option value="nvidia">NVIDIA</option>
          <option value="custom">Custom…</option>
        </select>
      </div>
      <div class="pg-controls" id="pg-custom-url-wrap" style="display:none;flex:2">
        <label>Base URL <span style="color:#64748b;font-size:11px">— e.g. http://localhost:11434/v1</span></label>
        <input type="text" id="pg-custom-url" placeholder="https://your-provider.com/v1" style="width:100%" />
      </div>
      <div class="pg-controls" style="flex:2">
        <label>Model <span id="pg-model-hint" style="color:#7c3aed;font-size:11px"></span></label>
        <div style="position:relative">
          <input type="text" id="pg-model" placeholder="e.g. claude-opus-4-5" style="width:100%" oninput="filterSuggestions()" onfocus="showSuggestions()" onblur="setTimeout(hideSuggestions,150)" />
          <div id="pg-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#1a1d27;border:1px solid #7c3aed;border-radius:8px;z-index:10;margin-top:4px;overflow:hidden"></div>
        </div>
      </div>
      <div class="pg-controls" style="max-width:110px">
        <label>Max Tokens</label>
        <input type="number" id="pg-tokens" value="512" min="1" max="4096" style="width:100%" />
      </div>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px">Message</label>
      <textarea id="pg-message" placeholder="Type your message…"></textarea>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <button class="btn" id="pg-send" onclick="sendTest()">Send</button>
      <span id="pg-status" style="font-size:12px;color:#64748b"></span>
    </div>
    <div class="pg-response" id="pg-response">Response will appear here…</div>
  </div>

  <!-- Recent Requests -->
  <div class="card">
    <p class="section-title">Recent Requests</p>
    <table>
      <thead>
        <tr><th>Time</th><th>Provider</th><th>Model</th><th>Status</th><th>Tokens</th><th>Cost</th><th>Latency</th></tr>
      </thead>
      <tbody id="requests-body"></tbody>
    </table>
  </div>
</div>

<script>
const COLORS = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#0891b2'];
let chartReq, chartCost;

function fmt(n, d=0) {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed ? n.toFixed(d) : n;
}

function timeSince(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString();
}

async function refresh() {
  const [stats, health] = await Promise.all([
    fetch('/api/stats').then(r=>r.json()),
    fetch('/api/health').then(r=>r.json()),
  ]);

  // Provider badges
  document.getElementById('providers').innerHTML = Object.entries(health)
    .map(([k,ok]) => `<span class="provider-badge ${ok?'ok':'missing'}">${ok?'✓':'✗'} ${k}</span>`)
    .join('');

  // Today stats
  const t = stats.today || {};
  document.getElementById('s-req').textContent = fmt(t.requests) || '0';
  document.getElementById('s-tok').textContent = fmt(t.total_tokens) || '0';
  document.getElementById('s-cost').textContent = t.cost_usd != null ? '$'+t.cost_usd.toFixed(4) : '$0.0000';

  const monthly_cost = (stats.monthly||[]).reduce((s,r) => s + (r.cost_usd||0), 0);
  document.getElementById('s-mcost').textContent = '$' + monthly_cost.toFixed(4);

  // Charts
  const labels = (stats.monthly||[]).map(r => r.provider);
  const reqData = (stats.monthly||[]).map(r => r.requests||0);
  const costData = (stats.monthly||[]).map(r => parseFloat((r.cost_usd||0).toFixed(4)));

  if (chartReq) chartReq.destroy();
  if (chartCost) chartCost.destroy();

  const chartOpts = (data, label, color) => ({
    type: 'bar',
    data: { labels, datasets: [{ label, data, backgroundColor: COLORS.slice(0,labels.length), borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color:'#94a3b8' }, grid: { color:'#1e293b' } }, y: { ticks: { color:'#94a3b8' }, grid: { color:'#1e293b' } } } }
  });

  chartReq = new Chart(document.getElementById('chart-requests'), chartOpts(reqData, 'Requests', COLORS));
  chartCost = new Chart(document.getElementById('chart-cost'), chartOpts(costData, 'Cost USD', COLORS));

  // Recent requests table
  const rows = (stats.recent||[]).map(r => `
    <tr>
      <td>${timeSince(r.timestamp)}</td>
      <td>${r.provider}</td>
      <td style="color:#94a3b8;font-size:11px">${r.model||'—'}</td>
      <td><span class="badge ${r.status_code<400?'badge-ok':'badge-err'}">${r.status_code}</span></td>
      <td>${fmt((r.input_tokens||0)+(r.output_tokens||0))}</td>
      <td>$${(r.cost_usd||0).toFixed(5)}</td>
      <td>${r.latency_ms||0}ms</td>
    </tr>`).join('');
  document.getElementById('requests-body').innerHTML = rows || '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:24px">No requests yet</td></tr>';

  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

const MODELS = {
  anthropic: ['claude-opus-4-5', 'claude-sonnet-4-5', 'claude-haiku-4-5', 'claude-3-5-sonnet-20241022', 'claude-3-5-haiku-20241022'],
  openai:    ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'o1', 'o1-mini'],
  deepseek:  ['deepseek-chat', 'deepseek-reasoner'],
  nvidia:    ['meta/llama-3.1-70b-instruct', 'meta/llama-3.1-8b-instruct', 'mistralai/mistral-7b-instruct-v0.3'],
};

function onProviderChange() {
  const provider = document.getElementById('pg-provider').value;
  document.getElementById('pg-model').value = '';
  document.getElementById('pg-model-hint').textContent = '';
  document.getElementById('pg-custom-url-wrap').style.display = provider === 'custom' ? 'block' : 'none';
  hideSuggestions();
}

function showSuggestions() {
  filterSuggestions(true);
}

function hideSuggestions() {
  document.getElementById('pg-suggestions').style.display = 'none';
}

function filterSuggestions(showAll = false) {
  const provider = document.getElementById('pg-provider').value;
  const input = document.getElementById('pg-model').value.toLowerCase();
  const box = document.getElementById('pg-suggestions');
  const hint = document.getElementById('pg-model-hint');
  const models = MODELS[provider] || [];

  const filtered = showAll && !input ? models : models.filter(m => m.includes(input));
  if (!filtered.length) { hideSuggestions(); hint.textContent = ''; return; }

  hint.textContent = '— pick one or type your own';
  box.innerHTML = filtered.map(m =>
    `<div style="padding:8px 12px;cursor:pointer;font-size:12px;color:#cbd5e1;border-bottom:1px solid #2d3748"
      onmousedown="pickModel('${m}')"
      onmouseover="this.style.background='#2d3748'"
      onmouseout="this.style.background=''">${m}</div>`
  ).join('');
  box.style.display = 'block';
}

function pickModel(name) {
  document.getElementById('pg-model').value = name;
  document.getElementById('pg-model-hint').textContent = '';
  hideSuggestions();
}

refresh();
setInterval(refresh, 5000);

async function sendTest() {
  const btn = document.getElementById('pg-send');
  const out = document.getElementById('pg-response');
  const status = document.getElementById('pg-status');
  const provider = document.getElementById('pg-provider').value;
  const model = document.getElementById('pg-model').value.trim();
  const message = document.getElementById('pg-message').value.trim();
  const max_tokens = parseInt(document.getElementById('pg-tokens').value) || 512;
  const custom_url = document.getElementById('pg-custom-url').value.trim();

  if (provider === 'custom' && !custom_url) { out.textContent = 'Please enter a base URL for your custom provider.'; out.className = 'pg-response err'; return; }
  if (!model) { out.textContent = 'Please enter a model name.'; out.className = 'pg-response err'; return; }
  if (!message) { out.textContent = 'Please enter a message.'; out.className = 'pg-response err'; return; }

  btn.disabled = true;
  status.textContent = 'Sending…';
  out.className = 'pg-response';
  out.textContent = '…';

  try {
    const t0 = Date.now();
    const res = await fetch('/api/test', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({provider, model, message, max_tokens, custom_url: custom_url || null}),
    });
    const data = await res.json();
    const ms = Date.now() - t0;

    if (data.error) {
      out.className = 'pg-response err';
      out.textContent = 'Error: ' + data.error;
      status.textContent = '';
    } else {
      const body = data.body;
      // Extract text from response
      let text = '';
      if (body.content) text = body.content.map(c => c.text||'').join('');          // Anthropic
      else if (body.choices) text = body.choices[0]?.message?.content || '';        // OpenAI
      else text = JSON.stringify(body, null, 2);

      out.className = data.status < 400 ? 'pg-response ok' : 'pg-response err';
      out.textContent = data.status < 400 ? text : JSON.stringify(body, null, 2);
      const usage = body.usage || {};
      const inp = usage.input_tokens || usage.prompt_tokens || 0;
      const outp = usage.output_tokens || usage.completion_tokens || 0;
      status.textContent = `${ms}ms · ${inp}in / ${outp}out tokens`;
    }
  } catch (e) {
    out.className = 'pg-response err';
    out.textContent = 'Request failed: ' + e.message;
    status.textContent = '';
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
